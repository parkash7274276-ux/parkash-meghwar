<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkash Meghwar AI | Multi-Language Assistant</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background-color: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Header Styling */
        .header {
            padding: 18px 24px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .brand-text h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand-text a {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .brand-text a:hover {
            color: var(--accent);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            background: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        .btn-clear {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }

        /* Chat Area */
        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 14px;
            max-width: 80%;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .ai .avatar {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }

        .user .avatar {
            background: #475569;
        }

        .msg-content {
            background: var(--bg-dark);
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid var(--border);
        }

        .user .msg-content {
            background: var(--accent);
            color: white;
            border: none;
            border-top-right-radius: 4px;
        }

        .ai .msg-content {
            border-top-left-radius: 4px;
        }

        /* RTL support for Urdu */
        .rtl {
            direction: rtl;
            font-family: 'Noto Nastaliq Urdu', serif;
            font-size: 1.1rem;
            line-height: 2;
        }

        .hindi {
            font-family: 'Noto Sans Devanagari', sans-serif;
        }

        /* Typing Indicator */
        .typing {
            display: none;
            gap: 5px;
            padding: 10px 15px;
            background: var(--bg-dark);
            border-radius: 20px;
            width: fit-content;
            margin-left: 50px;
            border: 1px solid var(--border);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            padding: 18px 24px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        button.send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 14px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.send-btn:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="logo-icon">PM</div>
                <div class="brand-text">
                    <h1>Parkash Meghwar AI</h1>
                    <a href="https://www.parkashmeghwar.com" target="_blank">www.parkashmeghwar.com</a>
                </div>
            </div>
            <div class="controls">
                <select id="langSelect" onchange="changeLanguage()">
                    <option value="en">🇺🇸 English</option>
                    <option value="ur">🇵🇰 اردو (Urdu)</option>
                    <option value="hi">🇮🇳 हिंदी (Hindi)</option>
                </select>
                <button class="btn-clear" onclick="clearChat()" title="Clear Chat">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </header>

        <!-- Chat Box -->
        <div class="chat-box" id="chatBox">
            <!-- Welcome Message -->
            <div class="message ai" id="welcomeMsg">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="msg-content">
                    Hello! I am Parkash Meghwar AI. Ask me any question, and I will answer you in your preferred language!
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing" id="typingIndicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Input Box -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask anything... (e.g., How to learn coding?)" onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // Language UI Translations
        const translations = {
            en: {
                welcome: "Hello! I am Parkash Meghwar AI. Ask me any question, and I will answer you in your preferred language!",
                placeholder: "Ask anything... (e.g., How to learn coding?)",
                aiRole: "You are Parkash Meghwar AI, a helpful, intelligent, and polite AI assistant created for www.parkashmeghwar.com. Answer clearly in English."
            },
            ur: {
                welcome: "السلام علیکم! میں پرکاش میگھواڑ AI ہوں۔ مجھ سے کوئی بھی سوال پوچھیں، میں آپ کو آپ کی پسندیدہ زبان میں جواب دوں گا!",
                placeholder: "کچھ بھی پوچھیں... (مثلاً: کوڈنگ کیسے سیکھیں؟)",
                aiRole: "You are Parkash Meghwar AI, a helpful assistant for www.parkashmeghwar.com. You MUST answer the user's question in clear Urdu language (using Urdu script/اردو رسم الخط)."
            },
            hi: {
                welcome: "नमस्ते! मैं प्रकाश मेघवाल AI हूँ। मुझसे कोई भी प्रश्न पूछें, मैं आपकी पसंदीदा भाषा में उत्तर दूँगा!",
                placeholder: "कुछ भी पूछें... (जैसे: कोडिंग कैसे सीखें?)",
                aiRole: "You are Parkash Meghwar AI, a helpful assistant for www.parkashmeghwar.com. You MUST answer the user's question in clear Hindi language (using Devanagari script)."
            }
        };

        let currentLang = 'en';

        // Change Language UI & Font Styling
        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value;
            const inputField = document.getElementById('userInput');
            const welcomeContent = document.querySelector('#welcomeMsg .msg-content');

            inputField.placeholder = translations[currentLang].placeholder;
            welcomeContent.innerText = translations[currentLang].welcome;

            // Apply font/RTL classes based on language
            if (currentLang === 'ur') {
                welcomeContent.className = 'msg-content rtl';
                inputField.dir = 'rtl';
            } else if (currentLang === 'hi') {
                welcomeContent.className = 'msg-content hindi';
                inputField.dir = 'ltr';
            } else {
                welcomeContent.className = 'msg-content';
                inputField.dir = 'ltr';
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function clearChat() {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = `
                <div class="message ai" id="welcomeMsg">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="msg-content ${currentLang === 'ur' ? 'rtl' : currentLang === 'hi' ? 'hindi' : ''}">
                        ${translations[currentLang].welcome}
                    </div>
                </div>
            `;
        }

        function appendMessage(sender, text) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            let contentClass = 'msg-content';
            if (currentLang === 'ur') contentClass += ' rtl';
            if (currentLang === 'hi') contentClass += ' hindi';

            const avatarIcon = sender === 'ai' ? '<i class="fa-solid fa-robot"></i>' : '<i class="fa-solid fa-user"></i>';

            msgDiv.innerHTML = `
                <div class="avatar">${avatarIcon}</div>
                <div class="${contentClass}">${text}</div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const userText = inputField.value.trim();
            if (!userText) return;

            // 1. Show User Message
            appendMessage('user', userText);
            inputField.value = '';

            // 2. Show Typing Indicator
            const typingIndicator = document.getElementById('typingIndicator');
            const chatBox = document.getElementById('chatBox');
            typingIndicator.style.display = 'flex';
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            /* ==========================================================
               🤖 REAL AI API INTEGRATION SECTION
               To make this 100% live with AI, paste your API Key below!
               You can use Google Gemini API (Free) or OpenAI API.
               ========================================================== */
            
            const API_KEY = "YOUR_API_KEY_HERE"; // <--- Put Gemini or OpenAI Key here
            const systemPrompt = translations[currentLang].aiRole;

            try {
                // Example simulation for immediate testing (Remove this block when API_KEY is added):
                if (API_KEY === "YOUR_API_KEY_HERE") {
                    setTimeout(() => {
                        typingIndicator.style.display = 'none';
                        let reply = "This is a demo response from Parkash Meghwar AI! To get real live answers, please insert your free Google Gemini API key in the JavaScript code.";
                        if (currentLang === 'ur') reply = "یہ پرکاش میگھواڑ AI کی طرف سے ایک نمائشی جواب ہے! اصلی اور لائیو جوابات کے لیے، براہ کرم جاوا سکرپٹ کوڈ میں اپنی Google Gemini API کی شامل کریں۔";
                        if (currentLang === 'hi') reply = "यह प्रकाश मेघवाल AI की ओर से एक डेमो उत्तर है! वास्तविक लाइव उत्तर प्राप्त करने के लिए, कृपया जावास्क्रिप्ट कोड में अपनी Google Gemini API कुंजी डालें।";
                        appendMessage('ai', reply);
                    }, 1500);
                    return;
                }

                // Real API Fetch (Google Gemini Example)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `${systemPrompt}\n\nUser Question: ${userText}` }]
                        }]
                    })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                const aiReply = data.candidates[0].content.parts[0].text;
                appendMessage('ai', aiReply);

            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage('ai', "⚠️ Error connecting to AI server. Please check your internet or API Key.");
                console.error("AI Error:", error);
            }
        }
    </script>
</body>
</html>
